<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./assets/logo.png" />
    <link rel="icon" type="image/svg+xml" href="./assets/logo.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/logo.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>music link swapper</title>
    <link rel="canonical" href="https://swapper.leosaquetto.com/" />
    <meta property="og:url" content="https://swapper.leosaquetto.com/" />
    <meta name="theme-color" content="#f7f8fb" />
    <script>
      (function syncInitialThemeMeta() {
        try {
          var savedTheme = localStorage.getItem("mls-theme");
          var theme = savedTheme === "dark" ? "dark" : "light";
          var color = theme === "dark" ? "#0b0b0d" : "#f7f8fb";
          document.documentElement.setAttribute("data-theme", theme);
          var themeMeta = document.querySelector('meta[name="theme-color"]');
          if (themeMeta) themeMeta.setAttribute("content", color);
        } catch (_error) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <div class="app-shell">
      <header class="hero-card reveal">
        <div class="hero-topbar">
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="alternar tema" title="alternar tema"></button>
        </div>

          <div class="hero-left">
            <img class="app-logo" src="https://i.imgur.com/T1uEx9T.gif?v=20260411" alt="logo do app" />
            <div class="hero-copy">
              <h1>music link<br />swapper</h1>
              <p class="hero-byline">por leo saquetto</p>
            </div>
          </div>

        <p class="hero-subtitle">qualquer streaming por um só link</p>
      </header>

      <main class="main-stack">
        <section id="accessGate" class="card status-card hidden" aria-live="polite"></section>

        <section class="card form-card reveal reveal-delay-1">
          <div class="label-row">
            <label id="inputLabel" class="label" for="linkInput">link da música</label>
            <div class="label-actions">
              <button id="searchModeButton" class="tiny-button tiny-icon-button" type="button" aria-label="modo pesquisa" title="modo pesquisa"></button>
              <button id="useSampleButton" class="tiny-button" type="button">usar exemplo</button>
            </div>
          </div>

          <div class="input-row">
            <input
              id="linkInput"
              class="text-input"
              type="url"
              inputmode="url"
              placeholder="cole o link da música aqui"
              autocomplete="off"
              autocapitalize="off"
              autocorrect="off"
              spellcheck="false"
            />
          </div>

          <div class="button-row button-row-compact">
            <button id="convertButton" class="primary-button primary-button-wide" type="button">
              swap ⇄
            </button>

            <button
              id="pasteButton"
              class="icon-button"
              type="button"
              aria-label="colar"
              title="colar"
            ></button>

            <button
              id="clearButton"
              class="icon-button"
              type="button"
              aria-label="limpar"
              title="limpar"
            ></button>
          </div>

          <div class="supported-chips icon-chips" id="supportedChips"></div>
        </section>

        <section id="statusCard" class="card status-card hidden" aria-live="polite"></section>

        <section id="resultCard" class="card result-card hidden reveal reveal-delay-2">
          <div class="result-header">
            <div id="coverWrap" class="cover-wrap hidden">
              <div id="coverShimmer" class="cover-shimmer hidden" aria-hidden="true"></div>
              <img id="coverImage" class="cover-image hidden" alt="capa do conteúdo" />
            </div>

            <div class="result-copy">
              <p id="resultDescription" class="result-description hidden"></p>

              <div class="result-title-row">
                <div class="result-title-stack">
                  <h2 id="resultTitle">resultado</h2>
                  <p id="resultMeta" class="result-meta"></p>
                </div>

                <div class="result-head-actions">
                  <button
                    id="copyOriginalButton"
                    class="mini-head-action hidden"
                    type="button"
                    aria-label="copiar original"
                    title="copiar original"
                  ></button>

                  <button
                    id="copyPrimaryButton"
                    class="mini-head-action hidden"
                    type="button"
                    aria-label="copiar principais"
                    title="copiar principais"
                  ></button>

                  <button
                    id="sharePrimaryButton"
                    class="mini-head-action hidden"
                    type="button"
                    aria-label="compartilhar principais"
                    title="compartilhar principais"
                  ></button>
                </div>
              </div>
            </div>
          </div>

          <div id="platformGroups" class="platform-groups"></div>
          <div id="resultLegend" class="result-legend hidden" aria-live="polite"></div>
        </section>
      </main>

      <div id="viewportFillSpacer" class="viewport-fill-spacer" aria-hidden="true"></div>

      <div id="floatingToast" class="floating-toast hidden" aria-live="polite"></div>

      <footer class="footer">
        <a
          class="shortcut-card"
          href="https://www.icloud.com/shortcuts/73dbfa8d2292493da4f48a0388d5cf07"
          target="_blank"
          rel="noopener noreferrer"
          aria-label="ios shortcut available"
        >
          <svg viewBox="0 0 16 16" version="1.1" xmlns="http://www.w3.org/2000/svg" height="16" width="16" aria-hidden="true">
            <path fill-rule="evenodd" clip-rule="evenodd" d="M2.16593 7.54673c-1.13208-0.72047-1.13208-2.37303 0.00001-3.09345l4.13399-2.63073c1.03727-0.66009 2.36294-0.66009 3.40021 0l4.134 2.63072c1.13207 0.72042 1.13207 2.37298 0 3.09345l-4.134 2.63073c-1.03727 0.66007-2.36293 0.66007-3.40021 0L2.16593 7.54673Z" fill="currentColor"></path>
            <path fill-rule="evenodd" clip-rule="evenodd" d="m13.1072 7.99067-3.40707-2.16812c-1.03727-0.66009-2.36287-0.6601-3.40019 0L2.89289 7.99067l3.94391 2.5098c0.70973 0.4516 1.61673 0.4516 2.32647 0l3.94393-2.5098Zm0.9072 0.59267c-0.0565 0.04607-0.1166 0.08953-0.18027 0.13007l-4.134 2.63073c-1.03727 0.66007-2.36293 0.66007-3.40021 0L2.16593 8.7134c-0.06366-0.04053-0.12374-0.084-0.18024-0.13007-0.94824 0.77327-0.88815 2.28347 0.18026 2.96333l4.13399 2.63073c1.03732 0.66013 2.36292 0.66013 3.40019 0l4.134-2.63073c1.06847-0.67987 1.12853-2.19007 0.18027-2.96333Z" fill="currentColor"></path>
          </svg>
          <span class="shortcut-text">ios shortcut available</span>
        </a>
        <p>feito por 🇧🇷 <a href="https://leosaquetto.com" target="_blank" rel="noopener noreferrer">leo saquetto</a></p>
        <p>powered by <a href="https://idonthavespotify.sjdonado.com" target="_blank" rel="noopener noreferrer">idonthavespotify</a> &amp; <a href="https://odesli.co" target="_blank" rel="noopener noreferrer"><strong>odesli</strong></a></p>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
