<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>music link swapper</title>
    <meta name="theme-color" content="#0f0f10" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="hero-card">
        <div class="hero-copy">
          <p class="eyebrow">mini app</p>
          <h1>music link swapper</h1>
          <p class="hero-subtitle">cole um link de streaming e encontre versões em outras plataformas.</p>
        </div>
        <div class="hero-badge" aria-hidden="true">♫</div>
      </header>

      <main class="main-stack">
        <section id="accessGate" class="card status-card hidden" aria-live="polite"></section>

        <section class="card form-card">
          <label class="label" for="linkInput">link da música</label>
          <div class="input-row">
            <input id="linkInput" class="text-input" type="url" inputmode="url" placeholder="https://open.spotify.com/..." autocomplete="off" />
            <button id="pasteButton" class="ghost-button" type="button">colar</button>
          </div>
          <div class="button-row">
            <button id="convertButton" class="primary-button" type="button">converter</button>
            <button id="clearButton" class="secondary-button" type="button">limpar</button>
          </div>
          <p class="hint">suporta apple music, spotify, youtube music, deezer, soundcloud, pandora, qobuz, bandcamp e tidal.</p>
        </section>

        <section id="statusCard" class="card status-card hidden" aria-live="polite"></section>

        <section id="resultCard" class="card result-card hidden">
          <div class="result-header">
            <img id="coverImage" class="cover-image hidden" alt="capa" />
            <div>
              <p id="resultDescription" class="result-description hidden"></p>
              <h2 id="resultTitle">resultado</h2>
              <p id="resultMeta" class="result-meta"></p>
            </div>
          </div>

          <div class="result-actions hidden" id="resultActions">
            <button id="copyAllButton" class="secondary-button" type="button">copiar tudo</button>
            <button id="copyOriginalButton" class="secondary-button" type="button">copiar original</button>
            <button id="copyUniversalButton" class="secondary-button hidden" type="button">copiar universal</button>
          </div>

          <div id="platformGroups" class="platform-groups"></div>
        </section>
      </main>

      <footer class="footer">by leo saquetto</footer>
    </div>

    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="./telegram.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
