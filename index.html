<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./assets/logo.png" />
    <link rel="icon" type="image/svg+xml" href="./assets/logo.svg" />
    <link rel="icon" type="image/png" sizes="192x192" href="./assets/logo.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>music link swapper</title>
    <link rel="canonical" href="https://swapper.leosaquetto.com/" />
    <meta property="og:url" content="https://swapper.leosaquetto.com/" />
    <meta name="theme-color" content="#f7f8fb" />
    <script>
        (function syncInitialThemeMeta() {
        try {
          var savedTheme = localStorage.getItem("mls-theme");
          var theme = savedTheme === "dark" ? "dark" : "light";
          
          // 1. Usar as cores exatas do seu var(--bg) do CSS
          var color = theme === "dark" ? "#0b0b0d" : "#f7f8fb";
          
          document.documentElement.setAttribute("data-theme", theme);
          
          // 2. Forçar o fundo instantaneamente antes do CSS carregar
          // Isso mata a faixa branca/preta no overscroll do PWA
          document.documentElement.style.backgroundColor = color;
          
          var themeMeta = document.querySelector('meta[name="theme-color"]');
          if (themeMeta) themeMeta.setAttribute("content", color);
        } catch (_error) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <div class="app-shell">
      <header class="hero-card reveal">
        <div class="hero-topbar">
          <button id="themeToggle" class="theme-toggle" type="button" aria-label="alternar tema" title="alternar tema"></button>
        </div>

          <div class="hero-left">
            <img class="app-logo" src="https://i.imgur.com/T1uEx9T.gif" alt="logo do app" />
            <div class="hero-copy">
              <h1>music link<br />swapper</h1>
              <p class="hero-byline">por leo saquetto</p>
            </div>
          </div>

        <p class="hero-subtitle">qualquer streaming por um só link</p>
      </header>

      <main class="main-stack">
        <section id="accessGate" class="card status-card hidden" aria-live="polite"></section>

        <section class="card form-card reveal reveal-delay-1">
          <div class="label-row">
            <label class="label" for="linkInput">link da música</label>
            <button id="useSampleButton" class="tiny-button" type="button">usar exemplo</button>
          </div>

          <div class="input-row">
            <input
              id="linkInput"
              class="text-input"
              type="url"
              inputmode="url"
              placeholder="cole o link da música aqui"
              autocomplete="off"
              autocapitalize="off"
              autocorrect="off"
              spellcheck="false"
            />
          </div>

          <div class="button-row button-row-compact">
            <button id="convertButton" class="primary-button primary-button-wide" type="button">
              swap
            </button>

            <button
              id="pasteButton"
              class="icon-button"
              type="button"
              aria-label="colar"
              title="colar"
            ></button>

            <button
              id="clearButton"
              class="icon-button"
              type="button"
              aria-label="limpar"
              title="limpar"
            ></button>
          </div>

          <div class="supported-chips icon-chips" id="supportedChips"></div>
        </section>

        <section id="statusCard" class="card status-card hidden" aria-live="polite"></section>

        <section id="resultCard" class="card result-card hidden reveal reveal-delay-2">
          <div class="result-header">
            <div id="coverWrap" class="cover-wrap hidden">
              <div id="coverShimmer" class="cover-shimmer hidden" aria-hidden="true"></div>
              <img id="coverImage" class="cover-image hidden" alt="capa do conteúdo" />
            </div>

            <div class="result-copy">
              <p id="resultDescription" class="result-description hidden"></p>

              <div class="result-title-row">
                <div class="result-title-stack">
                  <h2 id="resultTitle">resultado</h2>
                  <p id="resultMeta" class="result-meta"></p>
                </div>

                <div class="result-head-actions">
                  <button
                    id="copyOriginalButton"
                    class="mini-head-action hidden"
                    type="button"
                    aria-label="copiar original"
                    title="copiar original"
                  ></button>

                  <button
                    id="copyPrimaryButton"
                    class="mini-head-action hidden"
                    type="button"
                    aria-label="copiar principais"
                    title="copiar principais"
                  ></button>

                  <button
                    id="sharePrimaryButton"
                    class="mini-head-action hidden"
                    type="button"
                    aria-label="compartilhar principais"
                    title="compartilhar principais"
                  ></button>
                </div>
              </div>
            </div>
          </div>

          <div id="platformGroups" class="platform-groups"></div>
        </section>
      </main>

      <div id="floatingToast" class="floating-toast hidden" aria-live="polite"></div>

      <footer class="footer">
        <p>feito por 🇧🇷 <a href="https://leosaquetto.com" target="_blank" rel="noopener noreferrer">leo saquetto</a></p>
        <p>powered by <a href="https://idonthavespotify.sjdonado.com" target="_blank" rel="noopener noreferrer">idonthavespotify</a></p>
      </footer>
    </div>

    <script src="./app.js"></script>
  </body>
</html>
